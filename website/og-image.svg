<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(99,102,241,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative glow behind logo -->
  <circle cx="320" cy="280" r="180" fill="rgba(99,102,241,0.08)"/>
  <circle cx="320" cy="280" r="100" fill="rgba(99,102,241,0.05)"/>

  <!-- Logo: indigo rounded square with white Q -->
  <rect x="250" y="210" width="140" height="140" rx="28" fill="url(#accentGrad)"/>
  <!-- Q letter -->
  <text x="320" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central">Q</text>

  <!-- "Quiver" text -->
  <text x="430" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" fill="white" text-anchor="start" dominant-baseline="central">uiver</text>

  <!-- Tagline -->
  <text x="250" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="start">Your Claude Code skills, finally in one place.</text>

  <!-- Feature pills -->
  <!-- Web UI pill -->
  <rect x="250" y="470" width="130" height="42" rx="21" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="315" y="495" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#a5b4fc" text-anchor="middle">Web UI</text>

  <!-- Sync pill -->
  <rect x="400" y="470" width="110" height="42" rx="21" fill="rgba(45,212,191,0.12)" stroke="rgba(45,212,191,0.35)" stroke-width="1"/>
  <text x="455" y="495" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#5eead4" text-anchor="middle">Sync</text>

  <!-- Browse Marketplace pill -->
  <rect x="530" y="470" width="210" height="42" rx="21" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="635" y="495" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#a5b4fc" text-anchor="middle">Browse Marketplace</text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Top-right decorative element -->
  <circle cx="1050" cy="150" r="200" fill="rgba(45,212,191,0.04)"/>
  <circle cx="1050" cy="150" r="80" fill="rgba(45,212,191,0.03)"/>
</svg>
